backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        hint: "Direct Tax = ITR, TDS & Others · Indirect Tax = GST & Others · Corporate Compliance · Others"
        options:
          - { label: "Direct Tax — ITR", value: "ITR" }
          - { label: "Direct Tax — TDS", value: "TDS" }
          - { label: "Direct Tax — Others", value: "Direct Tax Others" }
          - { label: "Indirect Tax — GST", value: "GST" }
          - { label: "Indirect Tax — Others", value: "Indirect Tax Others" }
          - { label: "Corporate Compliance", value: "Corporate Compliance" }
          - { label: "Others", value: "Others" }
      - { label: "Read time (e.g. 5 min read)", name: "readtime", widget: "string", default: "5 min read" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Cover Image (optional)", name: "image", widget: "image", required: false }
      - { label: "Short summary", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "infographic"
    label: "Infographics"
    folder: "infographics"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Direct Tax — ITR", value: "ITR" }
          - { label: "Direct Tax — TDS", value: "TDS" }
          - { label: "Direct Tax — Others", value: "Direct Tax Others" }
          - { label: "Indirect Tax — GST", value: "GST" }
          - { label: "Indirect Tax — Others", value: "Indirect Tax Others" }
          - { label: "Corporate Compliance", value: "Corporate Compliance" }
          - { label: "Others", value: "Others" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Infographic Image", name: "image", widget: "image", hint: "Upload your Instagram-style infographic. Visitors can view & download it." }
      - { label: "Caption / description (optional)", name: "summary", widget: "text", required: false }
